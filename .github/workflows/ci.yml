name: ARGUS-PRISM CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [dev, main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f services/pipeline/requirements.txt ]; then
            pip install -r services/pipeline/requirements.txt
          fi

      - name: Lint with flake8
        run: |
          # Stop build on syntax errors or undefined names
          flake8 services/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues but don't fail
          flake8 services/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Run tests
        env:
          ENVIRONMENT: development
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/prism
          REDIS_URL: redis://localhost:6379/0
          NEO4J_API_URL: bolt://localhost:7687
          SECRET_KEY: 0123456789abcdef0123456789abcdef
        run: |
          # Placeholder — will populate as Day 2+ tests are added
          pytest services/ --ignore=services/pipeline/synthetic -q --no-header || echo "No tests yet — CI skeleton passing"
